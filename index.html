<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentations Index</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-900: #020b18;
    --blue-800: #061629;
    --blue-700: #0a2540;
    --blue-600: #0e3a60;
    --blue-500: #1258a8;
    --blue-400: #1e7fcb;
    --blue-300: #41a3e8;
    --blue-200: #7dc4f5;
    --blue-100: #c0e2fc;
    --blue-50: #e8f5ff;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --white: #f0f8ff;
    --text-muted: rgba(160,210,255,0.55);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: radial-gradient(circle at top left, rgba(0,212,255,0.08), transparent 22%),
                radial-gradient(circle at 85% 10%, rgba(0,102,255,0.12), transparent 16%),
                var(--blue-900);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .grid-overlay {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 1;
  }

  .cursor-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .track-lines {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 15% 10%, rgba(0,212,255,0.12), transparent 18%),
      radial-gradient(circle at 80% 20%, rgba(0,102,255,0.1), transparent 16%),
      radial-gradient(circle at 30% 85%, rgba(65,163,232,0.08), transparent 22%);
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.35;
  }

  .glow-orb.a {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #0a3d8f 0%, transparent 70%);
    top: -10%; left: -15%;
  }
  .glow-orb.b {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #00b4d8 0%, transparent 70%);
    bottom: 5%; right: -10%;
  }

  .index-container {
    position: relative;
    z-index: 2;
    max-width: 800px;
    width: 100%;
    text-align: center;
  }

  .index-title {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    font-weight: 600;
    margin-bottom: 2rem;
    background: linear-gradient(135deg, #ffffff 30%, var(--blue-200) 60%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .presentation-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
  }

  .presentation-link {
    display: block;
    background: rgba(6,22,41,0.7);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    text-decoration: none;
    color: var(--white);
    transition: all 0.3s ease;
    width: 100%;
    max-width: 450px;
  }
  .presentation-link:hover {
    border-color: rgba(0,212,255,0.35);
    transform: translateY(-2px);
    background: rgba(6,22,41,0.9);
  }

  .presentation-title {
    font-family: 'Inter', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .presentation-desc {
    font-size: 0.9rem;
    color: var(--blue-200);
    line-height: 1.4;
  }

  .add-note {
    margin-top: 3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .disclaimer {
    margin-top: 2rem;
    text-align: center;
  }
  .disclaimer p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin: 0;
  }
</style>
</head>
<body>
  <canvas id="cursorCanvas" class="cursor-canvas"></canvas>
  <div class="track-lines"></div>
  <div class="grid-overlay"></div>
  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>

  <div class="index-container">
    <h1 class="index-title">Presentations Index</h1>

    <div class="presentation-list">
      <!-- Example presentation -->
      <a href="manufacturer_system_presentation.html" class="presentation-link">
        <div class="presentation-title">Manufacturer System Presentation</div>
        <div class="presentation-desc">PHP web app · Oracle 21c XE database · Shared CSS interface · 4-person project</div>
      </a>

      <!-- Add more presentations here manually -->
      <!-- <a href="another_presentation.html" class="presentation-link">
        <div class="presentation-title">Another Presentation Title</div>
        <div class="presentation-desc">Description of the presentation</div>
      </a> -->
    </div>

    <div class="disclaimer">
      <p>All presentations were made for desktop viewing.</p>
    </div>

    <div class="add-note">
      Add new presentations above this line
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('cursorCanvas');
      const ctx = canvas.getContext('2d');
      const points = [];
      const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      const cols = 7;
      const rows = 4;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initPoints();
      }

      function initPoints() {
        points.length = 0;
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const x = (col + 0.5) * canvas.width / cols + (Math.random() - 0.5) * 80;
            const y = (row + 0.5) * canvas.height / rows + (Math.random() - 0.5) * 60;
            points.push({ x, y, r: 1.5 + Math.random() * 1.6 });
          }
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        points.forEach(point => {
          const dx = mouse.x - point.x;
          const dy = mouse.y - point.y;
          const dist = Math.hypot(dx, dy);
          const strength = Math.max(0, 1 - dist / 420);

          if (strength > 0.02) {
            ctx.strokeStyle = `rgba(0,212,255,${0.18 * strength})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(point.x, point.y);
            ctx.lineTo(mouse.x - dx * 0.1, mouse.y - dy * 0.1);
            ctx.stroke();
          }

          ctx.save();
          ctx.shadowColor = 'rgba(0,212,255,0.9)';
          ctx.shadowBlur = 14 * strength + 2;
          ctx.fillStyle = `rgba(0,212,255,${0.35 + strength * 0.35})`;
          ctx.beginPath();
          ctx.arc(point.x, point.y, point.r + strength * 1.1, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener('mousemove', event => {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
      });
      window.addEventListener('resize', resize);
      resize();
      draw();
    })();
  </script>
</body>
</html></content>
