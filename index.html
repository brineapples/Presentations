<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentations Index</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-900: #020b18;
    --blue-800: #061629;
    --blue-700: #0a2540;
    --blue-600: #0e3a60;
    --blue-500: #1258a8;
    --blue-400: #1e7fcb;
    --blue-300: #41a3e8;
    --blue-200: #7dc4f5;
    --blue-100: #c0e2fc;
    --blue-50: #e8f5ff;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --white: #f0f8ff;
    --text-muted: rgba(160,210,255,0.55);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--blue-900);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .grid-overlay {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.35;
  }

  .glow-orb.a {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #0a3d8f 0%, transparent 70%);
    top: -10%; left: -15%;
  }
  .glow-orb.b {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #00b4d8 0%, transparent 70%);
    bottom: 5%; right: -10%;
  }

  .index-container {
    position: relative;
    z-index: 2;
    max-width: 800px;
    width: 100%;
    text-align: center;
  }

  .index-title {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    font-weight: 600;
    margin-bottom: 2rem;
    background: linear-gradient(135deg, #ffffff 30%, var(--blue-200) 60%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .presentation-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
  }

  .presentation-link {
    display: block;
    background: rgba(6,22,41,0.7);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    text-decoration: none;
    color: var(--white);
    transition: all 0.3s ease;
    width: 100%;
    max-width: 450px;
  }
  .presentation-link:hover {
    border-color: rgba(0,212,255,0.35);
    transform: translateY(-2px);
    background: rgba(6,22,41,0.9);
  }

  .presentation-title {
    font-family: 'Inter', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .presentation-desc {
    font-size: 0.9rem;
    color: var(--blue-200);
    line-height: 1.4;
  }

  .add-note {
    margin-top: 3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>

  <div class="index-container">
    <h1 class="index-title">Presentations Index</h1>

    <div class="presentation-list">
      <!-- Example presentation -->
      <a href="manufacturer_system_presentation.html" class="presentation-link">
        <div class="presentation-title">Manufacturer System Presentation</div>
        <div class="presentation-desc">PHP web app · Oracle 21c XE database · Shared CSS interface · 4-person project</div>
      </a>

      <!-- Add more presentations here manually -->
      <!-- <a href="another_presentation.html" class="presentation-link">
        <div class="presentation-title">Another Presentation Title</div>
        <div class="presentation-desc">Description of the presentation</div>
      </a> -->
    </div>

    <div class="add-note">
      Add new presentations above this line
    </div>
  </div>
</body>
</html></content>
